name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', laravel: 10, testbench: 8 }
          - { php: '8.3', laravel: 11, testbench: 9 }
          - { php: '8.3', laravel: 12, testbench: 10 }
          - { php: '8.4', laravel: 12, testbench: 10 }
          - { php: '8.4', laravel: 13, testbench: 11 }
          - { php: '8.5', laravel: 13, testbench: 11 }

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Constrain dependency versions
        run: >
          composer require --no-update
          "laravel/framework:^${{ matrix.laravel }}.0"
          "orchestra/testbench:^${{ matrix.testbench }}.0"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pest
        run: vendor/bin/pest

  quality:
    runs-on: ubuntu-latest
    name: static analysis & style

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M
